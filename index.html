<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPO SHOWROOM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Подключение Tailwind через CDN */
        @import url('https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css');

        body {
            background-color: #050505;
            color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism эффект */
        .glass-card {
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
        }

        /* Неоновый акцент при активации */
        .neon-active {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: box-shadow 0.3s ease;
        }

        /* Плавающая анимация карточки */
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        /* Карусель изображений */
        .slider-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;            gap: 8px;
            padding: 8px 0;
            scrollbar-width: none;
        }

        .slider-container::-webkit-scrollbar {
            display: none;
        }

        .slide {
            scroll-snap-align: start;
            min-width: 100%;
            height: 280px;
            border-radius: 10px;
            overflow: hidden;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Индикаторы слайдов */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #333;
        }

        .indicator-dot.active {
            background-color: white;
        }

        /* Фильтры */
        .filters-sticky {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: rgba(5, 5, 5, 0.9);
            padding: 12px;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px 16px;
            border-radius: 20px;
            margin-right: 8px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: white;
            color: black;
        }

        /* Кнопки размеров */
        .size-btn {
            background: #111;
            border: 1px solid #222;
            color: #666;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .size-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* Кнопка купить */
        .btn-buy {
            background: #1a1a1a;
            color: #444;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: 700;
            cursor: not-allowed;
        }

        .btn-buy.active {
            background: #fff;
            color: #000;
            cursor: pointer;
        }
        /* Скрытые блоки */
        .hidden {
            display: none;
        }

        /* Стили формы */
        .input-item {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* Футер с локацией */
        .location-footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #666;
        }

        .location-btn {
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Экран каталога -->
    <div id="catalog" class="container px-4 py-6 max-w-md mx-auto">
        <!-- Логотип -->
        <div class="flex justify-between items-center mb-6">
            <div class="text-2xl font-black tracking-[4px]">DEPO</div>
            <div class="text-xs text-gray-500">NVSB // LIVE CLOUD</div>
        </div>

        <!-- Фильтры и поиск -->
        <div class="filters-sticky mb-6">
            <div class="flex overflow-x-auto pb-2 space-x-2">
                <button class="filter-btn active" data-category="all">Все</button>
                <button class="filter-btn" data-category="новинки">Новинки</button>                <button class="filter-btn" data-category="худи">Худи</button>
                <button class="filter-btn" data-category="брюки">Брюки</button>
                <button class="filter-btn" data-category="куртки">Куртки</button>
            </div>
            <input type="text" id="search-input" class="input-item mt-2" placeholder="Поиск...">
        </div>

        <!-- Состояние загрузки -->
        <div id="loading" class="text-center py-16 text-gray-500">ЗАГРУЗКА СКЛАДА...</div>

        <!-- Список товаров -->
        <div id="product-list" class="space-y-6"></div>
    </div>

    <!-- Экран оформления -->
    <div id="checkout" class="container px-4 py-6 max-w-md mx-auto hidden">
        <h2 class="text-xl font-bold tracking-wide mb-4">ОФОРМЛЕНИЕ</h2>
        <div id="order-summary" class="bg-gray-900 p-4 rounded-lg text-sm text-gray-400 mb-4"></div>
        <input type="text" id="user-name" class="input-item" placeholder="Ваше имя">
        <input type="tel" id="user-phone" class="input-item" placeholder="Телефон">
        <div class="location-footer">
            Новосибирск, ТЦ Москва (Крылова, 26)
            <button class="location-btn" onclick="openMap()">Открыть карту</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp || null;
        if (tg) {
            tg.expand();
        }

        // Конфигурация API
        const API_URL = 'https://script.google.com/macros/s/AKfycbzhDDpsajrKIwHuiXdeQswb6-h9XwM8PsWNNOI1BK4E8Xdwa7FUXHhCVpJiN62twXJ9/exec';

        // Состояние приложения
        let state = {
            products: [],
            cart: [],
            selectedCategory: 'all',
            searchQuery: '',
            isCheckout: false
        };

        // Загрузка данных
async function loadProducts() {
    const loadingEl = document.getElementById('loading');
    try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('Сеть не ответила');
        const data = await res.json();

        // Разделяем товары и категории
        state.products = Array.isArray(data) ? data : data.products || [];
        const categories = data.categories || [];

        // Генерируем фильтры
        renderFilters(categories);

        if (state.products.length === 0) {
            loadingEl.innerHTML = 'РЕЖИМ ОФЛАЙН: наличие уточняйте у менеджера';
        } else {
            loadingEl.classList.add('hidden');
            renderProducts();
        }
    } catch (err) {
        loadingEl.innerHTML = 'РЕЖИМ ОФЛАЙН: наличие уточняйте у менеджера';
        console.error('Ошибка загрузки:', err);
    }
}

// Генерация фильтров
function renderFilters(categories) {
    const filtersContainer = document.querySelector('.filters-sticky > div:first-child');
    filtersContainer.innerHTML = '';

    // Добавляем "Все"
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.dataset.category = 'all';
    allBtn.textContent = 'Все';
    allBtn.onclick = () => setCategoryFilter('all');
    filtersContainer.appendChild(allBtn);

    // Добавляем динамические категории
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.category = cat;
        btn.textContent = capitalize(cat);
        btn.onclick = () => setCategoryFilter(cat);
        filtersContainer.appendChild(btn);
    });
}

// Установка категории
function setCategoryFilter(category) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    state.selectedCategory = category;
    renderProducts();
}

// Функция для заглавной буквы
function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

        // Отрисовка товаров
        function renderProducts() {
            const filtered = state {
                const matchesCategory = state.selectedCategory === 'all' || p.category.toLowerCase().includes(state.selectedCategory);
                const matchesSearch = p.name.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            const listEl = document.getElementById('product-list');
            listEl.innerHTML = '';

            filtered.forEach(product => {
                const card = createProductCard(product);
                listEl.appendChild(card);
            });
        }

        // Создание карточки товара
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'glass-card floating p-4';

            const imageUrls = product.img.split(',').map(url => url.trim());
            let slidesHtml = '';
            imageUrls.forEach((url, idx) => {
                slidesHtml += `<div class="slide"><img src="${escapeHtml(url)}" onerror="this.style.display='none'"/></div>`;
            });

            let indicatorsHtml = '';
            imageUrls.forEach((_, idx) => {
                indicatorsHtml += `<div class="indicator-dot ${idx === 0 ? 'active' : ''}"></div>`;
            });

            card.innerHTML = `                <div class="slider-container">${slidesHtml}</div>
                <div class="indicators">${indicatorsHtml}</div>
                <div class="title text-lg font-bold my-2">${escapeHtml(product.name)}</div>
                <div class="desc text-xs text-gray-500 mb-2">${escapeHtml(product.desc)}</div>
                <div class="size-row flex gap-2 my-3">
                    ${(product.sizes || []).map(sz => `<button class="size-btn" onclick="selectSize(this, ${product.id}, '${escapeHtml(sz.trim())}')">${sz}</button>`).join('')}
                </div>
                <div class="price text-xl font-extrabold mb-3">${product.price} ₽</div>
                <button id="buy-${product.id}" class="btn-buy" disabled onclick="addToCart(${product.id})">ВЫБЕРИТЕ РАЗМЕР</button>
            `;

            return card;
        }

        // Выбор размера
        function selectSize(btn, id, size) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            const parent = btn.parentElement;
            parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const buyBtn = document.getElementById(`buy-${id}`);
            buyBtn.disabled = false;
            buyBtn.classList.add('active');
            buyBtn.textContent = `В КОРЗИНУ (${size})`;
            buyBtn.dataset.size = size;
        }

        // Добавление в корзину
        function addToCart(id) {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const product = state.products.find(p => p.id == id);
            const size = document.getElementById(`buy-${id}`).dataset.size;

            state.cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                size: size
            });

            updateTotal();
        }

        // Обновление суммы
        function updateTotal() {
            const total = state.cart.reduce((sum, item) => sum + item.price, 0);
            if (tg) {                tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ (${total} ₽)`);
                tg.MainButton.show();
            }
        }

        // Оформление заказа
        tg?.MainButton.onClick(() => {
            if (!state.isCheckout) {
                state.isCheckout = true;
                document.getElementById('catalog').classList.add('hidden');
                document.getElementById('checkout').classList.remove('hidden');

                const summary = state.cart.map(item => `• ${item.name} (${item.size})`).join('<br>');
                document.getElementById('order-summary').innerHTML = summary;

                tg.MainButton.setText('ОТПРАВИТЬ ЗАКАЗ МЕНЕДЖЕРУ');
            } else {
                sendOrder();
            }
        });

        // Отправка заказа
        async function sendOrder() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();

            if (!name || !phone) {
                tg?.showAlert('Заполните все поля!');
                tg?.HapticFeedback?.notificationOccurred('error');
                return;
            }

            if (tg) tg.MainButton.showProgress();

            const orderText = state.cart.map(item => `${item.name} (${item.size})`).join(', ');
            const total = state.cart.reduce((sum, item) => sum + item.price, 0);

            const data = { name, phone, order: orderText, total };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                tg?.showAlert('Заказ отправлен! Менеджер DEPO свяжется с вами.', () => {
                    tg?.close();
                });                tg?.HapticFeedback?.notificationOccurred('success');
            } catch (err) {
                tg?.showAlert('Ошибка сети. Проверьте соединение.');
                tg?.HapticFeedback?.notificationOccurred('error');
                tg?.MainButton?.hideProgress();
            }
        }

        // Открытие карты
        function openMap() {
            window.open('https://yandex.ru/maps/?pt=82.9183,55.0413&z=16&l=map', '_blank');
        }

        // Управление фильтрами
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.selectedCategory = btn.dataset.category;
                renderProducts();
            });
        });

        // Поиск
        document.getElementById('search-input').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderProducts();
        });

        // XSS защита
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Загрузка
        loadProducts();
    </script>
</body>
</html>
